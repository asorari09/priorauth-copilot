name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  changes:
    name: Detect eval-impacting changes
    runs-on: ubuntu-latest
    outputs:
      eval_paths: ${{ steps.filter.outputs.eval_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            eval_paths:
              - 'lib/**'
              - 'evals/**'
              - 'data/**'

  eval:
    name: Eval Suite
    runs-on: ubuntu-latest
    needs:
      - quality
      - changes
    if: >
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.eval_paths == 'true') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) &&
      !contains(github.event.head_commit.message, '[skip-eval]')
    steps:
      - name: Check required secrets
        id: secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for name in OPENAI_API_KEY ANTHROPIC_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip eval when secrets are unavailable
        if: ${{ steps.secrets.outputs.ready != 'true' }}
        run: echo "Eval suite skipped because required secrets are not configured."

      - name: Checkout
        if: ${{ steps.secrets.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.secrets.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ steps.secrets.outputs.ready == 'true' }}
        run: npm ci

      - name: Run eval suite
        if: ${{ steps.secrets.outputs.ready == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: npm run eval
